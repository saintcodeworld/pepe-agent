<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Agent Pepe</title>
    <meta name="description" content="Agent Pepe meme gallery - the dankest collection">
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery-section {
            margin-bottom: 60px;
            padding: 40px 0;
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .gallery-title {
            font-family: 'VT323', monospace;
            font-size: 3rem;
            color: var(--terminal-green);
            text-shadow: var(--glow);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .gallery-subtitle {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            padding: 20px 0;
        }

        .gallery-item {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--terminal-green);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            cursor: pointer;
            overflow: hidden;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.5);
            border-color: var(--pepe-green);
        }

        .gallery-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 5px;
            border: 1px solid rgba(0, 255, 65, 0.3);
            transition: all 0.3s;
        }

        .gallery-item:hover .gallery-image {
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
        }

        .gallery-item-info {
            margin-top: 12px;
            text-align: center;
        }

        .gallery-item-name {
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            color: var(--terminal-green);
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.5);
            letter-spacing: 1px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            border: 3px solid var(--terminal-green);
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 255, 65, 0.6);
        }

        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            font-size: 2rem;
            color: var(--terminal-green);
            cursor: pointer;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--terminal-green);
            border-radius: 5px;
            padding: 5px 15px;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--terminal-green);
            color: var(--terminal-dark);
            box-shadow: 0 0 20px var(--terminal-green);
        }

        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .gallery-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="scanlines"></div>
    <div class="crt-overlay"></div>
    
    <div class="container">
        <nav class="nav">
            <a href="/" class="logo">AGENT PEPE</a>
            <div class="nav-links">
                <a href="/">[[CHAT]]</a>
                <a href="memelab.html">[[MEME LAB]]</a>
                <a href="gallery.html" class="active">[[GALLERY]]</a>
                <a href="#rng">[[RNG]]</a>
                <a href="tokenomics.html">[[TOKEN]]</a>
            </div>
        </nav>

        <div class="gallery-section">
            <div class="gallery-header">
                <h1 class="gallery-title glitch" data-text="MEME GALLERY">MEME GALLERY</h1>
                <p class="gallery-subtitle">the dankest collection // feels good man</p>
            </div>

            <div class="gallery-grid" id="gallery-grid">
                <!-- Gallery items will be loaded here -->
            </div>
        </div>

        <footer class="footer">
            <p>© 2026 AGENT PEPE. ALL MEMES RESERVED. FEELS GOOD MAN.</p>
        </footer>
    </div>

    <div class="modal" id="imageModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <img class="modal-image" id="modalImage" src="" alt="Full size meme">
        </div>
    </div>

    <script>
        const images = [
            'meme gallery/image (1).jpg',
            'meme gallery/image (2).jpg',
            'meme gallery/image (3).jpg',
            'meme gallery/image (5).jpg',
            'meme gallery/image (7).jpg'
        ];

        const galleryGrid = document.getElementById('gallery-grid');
        const modal = document.getElementById('imageModal');
        const modalImage = document.getElementById('modalImage');
        const modalClose = document.getElementById('modalClose');

        images.forEach((imagePath, index) => {
            const galleryItem = document.createElement('div');
            galleryItem.className = 'gallery-item';
            
            const img = document.createElement('img');
            img.className = 'gallery-image';
            img.src = imagePath;
            img.alt = `Pepe Meme ${index + 1}`;
            img.loading = 'lazy';
            
            const info = document.createElement('div');
            info.className = 'gallery-item-info';
            
            const name = document.createElement('div');
            name.className = 'gallery-item-name';
            name.textContent = `MEME #${String(index + 1).padStart(3, '0')}`;
            
            info.appendChild(name);
            galleryItem.appendChild(img);
            galleryItem.appendChild(info);
            
            galleryItem.addEventListener('click', () => {
                modalImage.src = imagePath;
                modal.classList.add('active');
            });
            
            galleryGrid.appendChild(galleryItem);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
